<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardápio - Dona Brownie</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff8fb 0%, #fdeff5 100%);
      color: #6d4054;
    }

    .container {
      max-width: 1220px;
      margin: 0 auto;
      padding: 20px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      background: white;
      color: #9b667b;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(155, 102, 123, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .back-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(155, 102, 123, 0.18);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.35fr 0.8fr;
      gap: 24px;
      align-items: start;
    }

    .hero {
      background: linear-gradient(135deg, #f3c7d6 0%, #efb7cc 100%);
      border-radius: 30px;
      padding: 26px;
      margin-bottom: 22px;
      box-shadow: 0 10px 24px rgba(207, 127, 157, 0.18);
    }

    .hero-badge {
      display: inline-block;
      background: rgba(255,255,255,0.95);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 14px;
      color: #9b667b;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 38px;
      line-height: 1.1;
      color: #6d4054;
    }

    .hero p {
      margin: 0;
      color: #7f5568;
      line-height: 1.6;
      font-size: 15px;
      max-width: 760px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(109, 64, 84, 0.08);
      border: 1px solid rgba(255,255,255,0.8);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 28px rgba(109, 64, 84, 0.12);
    }

    .card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      border-radius: 22px;
      background: #f6d5e1;
      display: block;
      margin-bottom: 14px;
    }

    .placeholder {
      width: 100%;
      height: 190px;
      border-radius: 22px;
      background: linear-gradient(135deg, #f6d5e1 0%, #f0bfd0 100%);
      color: #8a6777;
      display: none;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      font-weight: bold;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
    }

    .card p {
      margin: 0 0 14px;
      color: #8a6777;
      line-height: 1.5;
      min-height: 78px;
      font-size: 14px;
    }

    .tag {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 10px;
      background: #fff0f6;
      color: #b06382;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .tag.destaque {
      background: #ffe4ee;
      color: #c45882;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    select, input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #f1d6df;
      border-radius: 16px;
      outline: none;
      margin-bottom: 10px;
      font-size: 14px;
      background: white;
      color: #6d4054;
    }

    select:focus, input:focus {
      border-color: #d78ca7;
      box-shadow: 0 0 0 3px rgba(215, 140, 167, 0.12);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }

    .price {
      font-size: 24px;
      font-weight: bold;
      color: #cf7f9d;
    }

    .add-btn, .finish-btn, .option-btn {
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .add-btn {
      background: linear-gradient(135deg, #cf7f9d 0%, #c76d90 100%);
      color: white;
      padding: 12px 20px;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(207, 127, 157, 0.25);
    }

    .add-btn:hover,
    .finish-btn:hover {
      transform: translateY(-1px);
    }

    .cart-box {
      background: rgba(255,255,255,0.96);
      border-radius: 30px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(109, 64, 84, 0.08);
      position: sticky;
      top: 20px;
      border: 1px solid rgba(255,255,255,0.85);
    }

    .cart-title {
      margin: 0 0 18px;
      font-size: 28px;
    }

    .empty-cart {
      background: #fff7fa;
      border: 1px dashed #efcfda;
      border-radius: 22px;
      padding: 16px;
      color: #8a6777;
      font-size: 14px;
    }

    .cart-item {
      background: linear-gradient(180deg, #fff9fc 0%, #fff3f8 100%);
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #f6d9e4;
    }

    .cart-item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .cart-item h4 {
      margin: 0 0 4px;
      font-size: 16px;
      line-height: 1.3;
    }

    .cart-item p {
      margin: 0;
      font-size: 13px;
      color: #8a6777;
      line-height: 1.45;
      white-space: pre-line;
    }

    .qty-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 999px;
      background: white;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      color: #9b667b;
    }

    .section {
      margin-top: 22px;
      padding-top: 20px;
      border-top: 1px solid #f1d6df;
    }

    .section h3 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .option-grid-3, .option-grid-2 {
      display: grid;
      gap: 10px;
    }

    .option-grid-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .option-grid-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .option-btn {
      background: white;
      border: 1px solid #f1d6df;
      border-radius: 18px;
      padding: 14px 10px;
      color: #6d4054;
      box-shadow: 0 4px 10px rgba(109, 64, 84, 0.04);
    }

    .option-btn.active {
      background: #fbe7ef;
      border-color: #d78ca7;
      color: #9b667b;
    }

    .summary {
      background: linear-gradient(180deg, #fff9fc 0%, #fff3f8 100%);
      border-radius: 22px;
      padding: 14px;
      margin-top: 16px;
      border: 1px solid #f6d9e4;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: bold;
    }

    .finish-btn {
      width: 100%;
      background: linear-gradient(135deg, #cf7f9d 0%, #c76d90 100%);
      color: white;
      padding: 16px;
      border-radius: 999px;
      font-size: 16px;
      margin-top: 16px;
      box-shadow: 0 10px 24px rgba(207, 127, 157, 0.28);
    }

    .finish-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .products {
        grid-template-columns: 1fr;
      }

      .cart-box {
        position: static;
      }

      .hero h1 {
        font-size: 30px;
      }
    }

    @media (max-width: 520px) {
      .container {
        padding: 14px;
      }

      .hero {
        padding: 20px;
      }

      .card {
        padding: 16px;
      }

      .mini-grid {
        grid-template-columns: 1fr;
      }

      .option-grid-3 {
        grid-template-columns: 1fr;
      }

      .option-grid-2 {
        grid-template-columns: 1fr 1fr;
      }

      .price-row {
        flex-direction: column;
        align-items: stretch;
      }

      .add-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="back-btn" onclick="voltar()">← Voltar</button>

    <div class="layout">
      <div>
        <div class="hero">
          <span class="hero-badge">Cardápio online</span>
          <h1>Monte seu pedido</h1>
          <p>Escolha os brownies, selecione os recheios, revise no carrinho e envie tudo direto para o WhatsApp da loja.</p>
        </div>

        <div class="products" id="products"></div>
      </div>

      <aside class="cart-box">
        <h2 class="cart-title">Seu carrinho</h2>
        <div id="cartItems"></div>

        <div class="section">
          <h3>Pagamento</h3>
          <div class="option-grid-3">
            <button class="option-btn active" data-payment="PIX" onclick="setPayment('PIX', this)">PIX</button>
            <button class="option-btn" data-payment="Débito" onclick="setPayment('Débito', this)">Débito</button>
            <button class="option-btn" data-payment="Crédito" onclick="setPayment('Crédito', this)">Crédito</button>
          </div>
        </div>

        <div class="section">
          <h3>Recebimento</h3>
          <div class="option-grid-2">
            <button class="option-btn active" data-delivery="Entrega" onclick="setDelivery('Entrega', this)">Entrega</button>
            <button class="option-btn" data-delivery="Retirada" onclick="setDelivery('Retirada', this)">Retirada</button>
          </div>
        </div>

        <div class="section">
          <h3>Seus dados</h3>
          <input id="customerName" placeholder="Seu nome" />
          <input id="customerPhone" placeholder="Seu WhatsApp" />

          <div id="deliveryFields">
            <input id="customerAddress" placeholder="Rua / Avenida" />
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
              <input id="customerNumber" placeholder="Número" />
              <input id="customerNeighborhood" placeholder="Bairro" />
            </div>
            <input id="customerComplement" placeholder="Complemento" />
            <input id="customerReference" placeholder="Ponto de referência" />
          </div>
        </div>

        <div class="summary">
          <div class="summary-row">
            <span>Total</span>
            <strong id="totalPrice">R$ 0,00</strong>
          </div>
        </div>

        <button class="finish-btn" id="finishBtn" onclick="finishOrder()" disabled>
          Finalizar pedido no WhatsApp
        </button>
      </aside>
    </div>
  </div>

  <script>
    const products = [
      {
        id: 1,
        name: "Brownie Tradicional",
        category: "Brownies",
        image: "produtos/brownie-tradicional.jpg",
        description: "Nosso brownie clássico 7x7cm com casquinha crocante por fora e massa super macia e úmida por dentro. Um sabor intenso de chocolate que derrete na boca.",
        price: 5,
        fillings: [{ name: "Tradicional", extra: 0 }],
        tag: "Clássico"
      },
      {
        id: 2,
        name: "Brownie Recheado",
        category: "Brownies",
        image: "produtos/brownie-recheado.jpg",
        description: "Casquinha crocante por fora, massa úmida e intensa por dentro. Monte seu brownie com o recheio que você quiser.",
        price: 10,
        fillings: [
          { name: "Brigadeiro", extra: 0 },
          { name: "Doce de leite", extra: 0 },
          { name: "Ninho", extra: 0 },
          { name: "Nutella", extra: 2 },
          { name: "Ninho com Nutella", extra: 2 }
        ],
        tag: "Mais pedido",
        destaque: true
      },
      {
        id: 3,
        name: "Copo Recheado 300ml",
        category: "Copos",
        image: "produtos/copo-recheado.jpg",
        description: "Uma explosão de sabor em cada colherada. Escolha sua combinação favorita e aproveite junto com bordinhas de brownie.",
        price: 12,
        fillings: [
          { name: "Ninho com Nutella", extra: 0 },
          { name: "Ninho com brigadeiro", extra: 0 },
          { name: "Brigadeiro com brigadeiro", extra: 0 },
          { name: "Brigadeiro com doce de leite", extra: 0 }
        ],
        tag: "Cremoso"
      },
      {
        id: 4,
        name: "Caixinha 6 Mini Brownies",
        category: "Caixas",
        image: "produtos/caixinha-mini-brownies.jpg",
        description: "Monte sua caixinha perfeita escolhendo 6 sabores separadamente.",
        price: 12,
        fillings: [
          { name: "Ninho", extra: 0 },
          { name: "Brigadeiro", extra: 0 },
          { name: "Nutella", extra: 0 },
          { name: "Doce de leite", extra: 0 }
        ],
        tag: "Monte do seu jeito"
      },
      {
        id: 5,
        name: "Cento de Mini Brownies",
        category: "Cento",
        image: "produtos/cento-mini-brownies.jpg",
        description: "100 unidades ideais para festas e eventos. Escolha entre tradicional, recheado ou meio a meio.",
        price: 90,
        fillings: [
          { name: "Tradicional", extra: 0 },
          { name: "Recheados", extra: 50 },
          { name: "Meio a meio", extra: 30 }
        ],
        tag: "Para festas"
      }
    ];

    let cart = [];
    let payment = "PIX";
    let deliveryType = "Entrega";

    function formatPrice(value) {
      return value.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function voltar() {
      window.location.href = "index.html";
    }

    function getMiniBoxChoices(productId) {
      const choices = [];
      for (let i = 1; i <= 6; i++) {
        const el = document.getElementById(`mini-${productId}-${i}`);
        choices.push(el ? el.value : "");
      }
      return choices;
    }

    function renderProducts() {
      const container = document.getElementById("products");
      container.innerHTML = "";

      products.forEach((product) => {
        const card = document.createElement("div");
        card.className = "card";

        const options = product.fillings
          .map(
            (filling) =>
              `<option value="${filling.name}">${filling.name}${filling.extra > 0 ? ` (+${formatPrice(filling.extra)})` : ""}</option>`
          )
          .join("");

        const badgeClass = product.destaque ? "tag destaque" : "tag";

        let productOptionsHtml = "";

        if (product.id === 4) {
          productOptionsHtml = `
            <label>Escolha os 6 sabores</label>
            <div class="mini-grid">
              <select id="mini-4-1">${options}</select>
              <select id="mini-4-2">${options}</select>
              <select id="mini-4-3">${options}</select>
              <select id="mini-4-4">${options}</select>
              <select id="mini-4-5">${options}</select>
              <select id="mini-4-6">${options}</select>
            </div>
          `;
        } else {
          productOptionsHtml = `
            <label>Escolha a opção</label>
            <select id="select-${product.id}">
              ${options}
            </select>
          `;
        }

        card.innerHTML = `
          <img src="${product.image}" alt="${product.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
          <div class="placeholder">Foto do produto</div>
          <span class="${badgeClass}">${product.tag || "Delícia da casa"}</span>
          <h3>${product.name}</h3>
          <p>${product.description}</p>
          ${productOptionsHtml}
          <div class="price-row">
            <span class="price" id="price-${product.id}">${formatPrice(product.price)}</span>
            <button class="add-btn" onclick="addToCart(${product.id})">Adicionar</button>
          </div>
        `;

        container.appendChild(card);

        if (product.id !== 4) {
          const select = card.querySelector(`#select-${product.id}`);
          select.addEventListener("change", function () {
            updateDisplayedPrice(product.id);
          });
          updateDisplayedPrice(product.id);
        }
      });
    }

    function updateDisplayedPrice(productId) {
      const product = products.find((p) => p.id === productId);
      if (!product || product.id === 4) return;

      const select = document.getElementById(`select-${productId}`);
      const selected = product.fillings.find((f) => f.name === select.value);
      const totalPrice = product.price + selected.extra;
      document.getElementById(`price-${productId}`).textContent = formatPrice(totalPrice);
    }

    function addToCart(productId) {
      const product = products.find((p) => p.id === productId);

      if (product.id === 4) {
        const selectedChoices = getMiniBoxChoices(productId);
        const fillingText = selectedChoices
          .map((item, index) => `${index + 1}. ${item}`)
          .join("\n");

        cart.push({
          id: product.id,
          name: product.name,
          category: product.category,
          filling: fillingText,
          price: product.price,
          quantity: 1,
          uniqueKey: Date.now() + Math.random()
        });

        renderCart();
        return;
      }

      const select = document.getElementById(`select-${productId}`);
      const selectedFilling = product.fillings.find((f) => f.name === select.value);
      const finalPrice = product.price + selectedFilling.extra;

      const existing = cart.find(
        (item) => item.id === product.id && item.filling === selectedFilling.name
      );

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({
          id: product.id,
          name: product.name,
          category: product.category,
          filling: selectedFilling.name,
          price: finalPrice,
          quantity: 1,
          uniqueKey: Date.now() + Math.random()
        });
      }

      renderCart();
    }

    function updateQuantity(uniqueKey, delta) {
      const item = cart.find((i) => i.uniqueKey === uniqueKey);
      if (!item) return;

      item.quantity += delta;

      if (item.quantity <= 0) {
        cart = cart.filter((i) => i.uniqueKey !== uniqueKey);
      }

      renderCart();
    }

    function renderCart() {
      const cartItems = document.getElementById("cartItems");
      const totalPrice = document.getElementById("totalPrice");
      const finishBtn = document.getElementById("finishBtn");

      if (cart.length === 0) {
        cartItems.innerHTML = `<div class="empty-cart">Nenhum item adicionado ainda.</div>`;
        totalPrice.textContent = formatPrice(0);
        finishBtn.disabled = true;
        return;
      }

      cartItems.innerHTML = "";

      cart.forEach((item) => {
        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          <div class="cart-item-top">
            <div>
              <h4>${item.name}</h4>
              <p>Opção: ${item.filling}</p>
            </div>
            <strong>${formatPrice(item.price * item.quantity)}</strong>
          </div>
          <div class="qty-row">
            <button class="qty-btn" onclick="updateQuantity(${item.uniqueKey}, -1)">-</button>
            <span>${item.quantity}</span>
            <button class="qty-btn" onclick="updateQuantity(${item.uniqueKey}, 1)">+</button>
          </div>
        `;
        cartItems.appendChild(div);
      });

      const total = cart.reduce((acc, item) => acc + item.price * item.quantity, 0);
      totalPrice.textContent = formatPrice(total);
      finishBtn.disabled = false;
    }

    function setPayment(value, button) {
      payment = value;
      document.querySelectorAll("[data-payment]").forEach((btn) => btn.classList.remove("active"));
      button.classList.add("active");
    }

    function setDelivery(value, button) {
      deliveryType = value;
      document.querySelectorAll("[data-delivery]").forEach((btn) => btn.classList.remove("active"));
      button.classList.add("active");
      document.getElementById("deliveryFields").style.display =
        value === "Entrega" ? "block" : "none";
    }

    function finishOrder() {
      if (cart.length === 0) return;

      const name = document.getElementById("customerName").value.trim();
      const phone = document.getElementById("customerPhone").value.trim();
      const address = document.getElementById("customerAddress").value.trim();
      const number = document.getElementById("customerNumber").value.trim();
      const neighborhood = document.getElementById("customerNeighborhood").value.trim();
      const complement = document.getElementById("customerComplement").value.trim();
      const reference = document.getElementById("customerReference").value.trim();

      const grouped = {};
      cart.forEach((item) => {
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
      });

      let itemsText = "";
      for (const category in grouped) {
        itemsText += `*${category.toUpperCase()}*%0A`;
        grouped[category].forEach((item) => {
          const safeFilling = item.filling.replace(/\n/g, "%0A   ");
          itemsText += `- ${item.name} | Opção: ${safeFilling} | Qtd: ${item.quantity} | ${formatPrice(item.price * item.quantity)}%0A`;
        });
        itemsText += `%0A`;
      }

      const total = cart.reduce((acc, item) => acc + item.price * item.quantity, 0);

      let message = `Olá, Dona Brownie!%0A%0A🍫 *Novo pedido*%0A%0A${itemsText}`;
      message += `------------------------%0A`;
      message += `💰 *Total:* ${formatPrice(total)}%0A`;
      message += `💳 *Pagamento:* ${payment}%0A`;
      message += `👤 *Cliente:* ${name || "-"}%0A`;
      message += `📱 *Telefone:* ${phone || "-"}%0A`;

      if (deliveryType === "Entrega") {
        message += `🚚 *Recebimento:* Entrega%0A`;
        message += `📍 *Endereço:* ${address || "-"}, Nº ${number || "-"} - ${neighborhood || "-"}%0A`;
        message += `🏷️ *Complemento:* ${complement || "-"}%0A`;
        message += `📌 *Referência:* ${reference || "-"}%0A`;
      } else {
        message += `🛍️ *Recebimento:* Retirada na loja%0A`;
      }

      window.open(`https://wa.me/5586999160590?text=${message}`, "_blank");
    }

    renderProducts();
    renderCart();
    document.getElementById("deliveryFields").style.display = "block";
  </script>
</body>
</html>
